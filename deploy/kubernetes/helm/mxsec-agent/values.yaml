image:
  repository: registry.example.com/mxsec/agent
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

server:
  host: "mxsec-agentcenter.mxsec.svc.cluster.local:6751"

agent:
  # Working directory for agent data (WAL, cache, rules).
  workDir: /var/lib/mxsec-agent
  # Log level: debug / info / warn / error.
  logLevel: info

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

tolerations:
  - operator: Exists

nodeSelector: {}

priorityClassName: system-node-critical

serviceAccount:
  create: true
  name: ""
  annotations: {}
