apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ .Release.Name }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mxsec-agent.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "mxsec-agent.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "20%"
  template:
    metadata:
      labels:
        {{- include "mxsec-agent.selectorLabels" . | nindent 8 }}
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "mxsec-agent.serviceAccountName" . }}
      priorityClassName: {{ .Values.priorityClassName | default "system-node-critical" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MXSEC_SERVER_HOST
              value: {{ .Values.server.host | quote }}
            - name: MXSEC_LOG_LEVEL
              value: {{ .Values.agent.logLevel | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            privileged: true
            runAsUser: 0
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: host-proc
              mountPath: /proc
              readOnly: true
            - name: host-sys
              mountPath: /sys
              readOnly: true
            - name: host-etc
              mountPath: /host/etc
              readOnly: true
            - name: host-root
              mountPath: /host
              readOnly: true
            - name: agent-data
              mountPath: {{ .Values.agent.workDir }}
            - name: container-sock
              mountPath: /var/run
              readOnly: true
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-etc
          hostPath:
            path: /etc
        - name: host-root
          hostPath:
            path: /
        - name: agent-data
          hostPath:
            path: {{ .Values.agent.workDir }}
            type: DirectoryOrCreate
        - name: container-sock
          hostPath:
            path: /var/run
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
