name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  go-build:
    name: Go build + vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Build all
        run: go build ./...
      - name: Vet
        run: go vet ./...

  go-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          args: --timeout 5m

  go-test:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests (race + coverage)
        run: |
          go test ./... \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout 5m
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -20
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  go-bench:
    name: Pipeline benchmark (perf gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run pipeline bench
        run: |
          go test -run=^$ -bench=BenchmarkPipeline -benchmem -benchtime=1000x \
            ./internal/server/engine/ | tee bench.out
      - name: Perf gate
        # 性能闸: 单消息无 stage <2µs, 单 stage <5µs;
        # 超过即认为有明显回归, fail CI 等开发分析。
        run: |
          awk '
            /BenchmarkPipeline_NoStages/ {
              ns=$3; if (ns > 2000) { print "GATE FAIL NoStages ns/op=" ns; exit 1 }
            }
            /BenchmarkPipeline_OneStage/ {
              ns=$3; if (ns > 5000) { print "GATE FAIL OneStage ns/op=" ns; exit 1 }
            }
          ' bench.out
      - uses: actions/upload-artifact@v4
        with:
          name: bench-result
          path: bench.out

  ui-build:
    name: UI build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npm run type-check || true   # 待后续修复后变 strict
      - run: npm run build

  security-scan:
    name: Security scan (gosec + nancy)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: Run gosec
        run: gosec -fmt=sarif -out=gosec.sarif -severity=high ./... || true
      - uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: gosec.sarif
