schema_version: 1
id: MXEDR-0024
name: container_escape_privileged_mount
version: 1
category: process
severity: critical
mitre:
  tactic: privilege_escalation
  technique: T1611
tags: [container, escape, privileged]
agent:
  enabled: true
  action: suspend
  enforce: false
  match:
    event_type: process_exec
    conditions:
      - field: container_id
        op: not_equals
        value: ""
      - field: cmdline
        op: regex
        value: "(mount\\s+.*/dev/(sda|vda|xvda|nvme)|fdisk|debugfs|blkid.*/(sda|vda))"
    logic: and
metadata:
  description: "检测特权容器挂载宿主机磁盘设备进行逃逸"
  confidence: 90
