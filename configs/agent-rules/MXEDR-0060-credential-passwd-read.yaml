schema_version: 1
id: MXEDR-0060
name: credential_passwd_read
version: 1
category: process
severity: medium
mitre:
  tactic: credential_access
  technique: T1003.008
tags: [credential_access, password]
agent:
  enabled: true
  action: alert
  enforce: false
  match:
    event_type: process_exec
    conditions:
      - field: cmdline
        op: regex
        value: "(cat|head|tail|less|more|vi|vim|nano)\\s+.*/etc/(shadow|passwd|gshadow)"
    logic: and
metadata:
  description: "检测读取系统密码文件操作"
  confidence: 65
  false_positive:
    - "管理员查看用户账号信息"
