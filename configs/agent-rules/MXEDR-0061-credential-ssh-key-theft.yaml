schema_version: 1
id: MXEDR-0061
name: credential_ssh_key_theft
version: 1
category: process
severity: high
mitre:
  tactic: credential_access
  technique: T1552.004
tags: [credential_access, ssh]
agent:
  enabled: true
  action: alert
  enforce: false
  match:
    event_type: process_exec
    conditions:
      - field: cmdline
        op: regex
        value: "(cat|cp|scp|tar|zip)\\s+.*\\.ssh/(id_rsa|id_ed25519|id_ecdsa)"
    logic: and
metadata:
  description: "检测 SSH 私钥文件被复制或读取"
  confidence: 80
